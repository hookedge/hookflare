name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @hookflare/shared build
      - name: Typecheck
        run: pnpm --filter @hookflare/worker typecheck && pnpm --filter hookflare typecheck
      - name: Test
        run: pnpm --filter @hookflare/worker test

  publish-cli:
    name: Publish hookflare CLI
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @hookflare/shared build
      - name: Build CLI
        run: pnpm --filter hookflare build
      - run: npm publish --access public
        working-directory: packages/cli
