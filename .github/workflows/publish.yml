name: Publish to npm

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0

jobs:
  # Run tests first
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @hookflare/shared build
      - name: Typecheck
        run: pnpm --filter @hookflare/worker typecheck && pnpm --filter hookflare typecheck
      - name: Test
        run: pnpm --filter @hookflare/worker test

  # Publish CLI package with provenance
  publish-cli:
    name: Publish hookflare CLI
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @hookflare/shared build

      - name: Build CLI
        run: pnpm --filter hookflare build

      - name: Publish with provenance
        run: |
          npm config set registry https://registry.npmjs.org/
          npm publish --provenance --access public
        working-directory: packages/cli
